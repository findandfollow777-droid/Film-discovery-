<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortlist Service Test</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #0a0e1a;
      color: #f0f4f8;
    }
    h1 {
      color: #00d9ff;
    }
    .test-section {
      margin: 30px 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: #00d9ff;
      border: none;
      border-radius: 6px;
      color: #000;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #00b8e6;
    }
    .danger {
      background: #ef4444;
    }
    .danger:hover {
      background: #dc2626;
    }
    #output {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }
    .success {
      color: #10b981;
    }
    .error {
      color: #ef4444;
    }
    .info {
      color: #00d9ff;
    }
  </style>
  <link rel="stylesheet" href="css/shortlist-badge.css">
</head>
<body>
  <h1>🌟 Shortlist Service Test</h1>

  <div class="test-section">
    <h3>Add Movies</h3>
    <button onclick="addMovie(1)">Add Inception</button>
    <button onclick="addMovie(2)">Add Dark Knight</button>
    <button onclick="addMovie(3)">Add Interstellar</button>
    <button onclick="addMovie(4)">Add Dunkirk</button>
    <button onclick="addMovie(5)">Add Tenet</button>
    <button onclick="addMovie(6)">Add 6th Movie (should fail)</button>
  </div>

  <div class="test-section">
    <h3>Check Status</h3>
    <button onclick="showShortlist()">Show Shortlist</button>
    <button onclick="checkCount()">Check Count</button>
    <button onclick="checkCanCompare()">Can Compare?</button>
  </div>

  <div class="test-section">
    <h3>Remove & Clear</h3>
    <button onclick="removeMovie(27205)">Remove Inception</button>
    <button class="danger" onclick="clearAll()">Clear All</button>
  </div>

  <div class="test-section">
    <h3>Advanced</h3>
    <button onclick="exportData()">Export</button>
    <button onclick="showDetails()">Show Details</button>
  </div>

  <div id="output">Ready to test...</div>

  <script type="module">
    import * as shortlist from './shortlist-service.js';

    // Make functions available globally for button onclick
    window.shortlist = shortlist;

    const output = document.getElementById('output');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const className = type;
      output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
      output.scrollTop = output.scrollHeight;
    }

    window.log = log;

    // Test movies
    const testMovies = [
      { id: 27205, title: 'Inception', year: 2010, poster: '/inception.jpg' },
      { id: 155, title: 'The Dark Knight', year: 2008, poster: '/tdk.jpg' },
      { id: 157336, title: 'Interstellar', year: 2014, poster: '/interstellar.jpg' },
      { id: 374720, title: 'Dunkirk', year: 2017, poster: '/dunkirk.jpg' },
      { id: 577922, title: 'Tenet', year: 2020, poster: '/tenet.jpg' },
      { id: 335984, title: 'Blade Runner 2049', year: 2017, poster: '/br2049.jpg' }
    ];

    window.addMovie = function(index) {
      const movie = testMovies[index - 1];
      log(`Adding: ${movie.title}...`, 'info');
      const result = shortlist.addToShortlist(movie);

      if (result.success) {
        log(`✅ Added successfully! Count: ${result.count}`, 'success');
      } else {
        log(`❌ Failed: ${result.error}`, 'error');
      }

      // Update floating badge
      if (typeof window.updateShortlistBadge === 'function') {
        window.updateShortlistBadge();
      }
    };

    window.showShortlist = function() {
      const list = shortlist.getShortlist();
      log(`📋 Current Shortlist (${list.length} movies):`, 'info');
      if (list.length === 0) {
        log('  (empty)', 'info');
      } else {
        list.forEach((m, i) => {
          log(`  ${i + 1}. ${m.title} (${m.year}) - ID: ${m.id}`, 'info');
        });
      }
    };

    window.checkCount = function() {
      const count = shortlist.getShortlistCount();
      log(`📊 Count: ${count} / 5`, 'info');
      log(`📊 Remaining slots: ${shortlist.getRemainingSlots()}`, 'info');
      log(`📊 Full: ${shortlist.isShortlistFull() ? 'Yes' : 'No'}`, 'info');
    };

    window.checkCanCompare = function() {
      const canCompare = shortlist.canCompare();
      const count = shortlist.getShortlistCount();

      if (canCompare) {
        log(`✅ Can compare (${count} >= 2)`, 'success');
      } else {
        log(`❌ Need at least 2 movies to compare (current: ${count})`, 'error');
      }
    };

    window.removeMovie = function(movieId) {
      log(`Removing movie ID ${movieId}...`, 'info');
      const result = shortlist.removeFromShortlist(movieId);

      if (result.success) {
        log(`✅ Removed! New count: ${result.count}`, 'success');
      } else {
        log(`❌ Failed to remove`, 'error');
      }

      // Update floating badge
      if (typeof window.updateShortlistBadge === 'function') {
        window.updateShortlistBadge();
      }
    };

    window.clearAll = function() {
      if (confirm('Clear all movies from shortlist?')) {
        shortlist.clearShortlist();
        log(`🗑️ Shortlist cleared!`, 'success');

        // Update floating badge
        if (typeof window.updateShortlistBadge === 'function') {
          window.updateShortlistBadge();
        }
      }
    };

    window.exportData = function() {
      const exported = shortlist.exportShortlist();
      log(`📤 Exported data:`, 'info');
      log(exported, 'info');
    };

    window.showDetails = function() {
      const details = shortlist.getShortlistDetails();
      log(`📋 Full details:`, 'info');
      log(JSON.stringify(details, null, 2), 'info');
    };

    // Initial status
    log('✨ Shortlist Service loaded', 'success');
    window.showShortlist();
  </script>
  <script src="js/shortlist-badge.js"></script>
</body>
</html>
