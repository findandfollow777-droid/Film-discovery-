<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORBIT - Actor Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../variables.css">
  <link rel="stylesheet" href="actor-timeline.css?v=4">
  <link rel="stylesheet" href="../components/moviecube.css">
  <link rel="stylesheet" href="../components/people-cube.css">
  <link rel="stylesheet" href="../components/shortlist-badge.css">
  <link rel="stylesheet" href="../components/orbit-glyphs.css">
  <link rel="stylesheet" href="../components/taste-overlay.css">
</head>
<body>

  <!-- CINEMATIC BACKGROUND -->
  <div class="space-bg"></div>
  <div class="film-grain"></div>

  <!-- HEADER -->
  <header class="at-header">
    <a href="../index.html" class="back-link" id="backNav">← Back to ORBIT</a>
    <div class="header-center">
      <img id="actorPhoto" class="actor-photo" src="" alt="">
      <div class="header-text">
        <h1 id="actorName">Loading...</h1>
        <p id="actorStats"></p>
        <div id="actorProfileLink"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="media-toggle" id="mediaToggle">
        <button class="toggle-btn active" data-mode="both">Both</button>
        <button class="toggle-btn" data-mode="movies">Movies</button>
        <button class="toggle-btn" data-mode="tv">TV</button>
      </div>
      <button class="career-dna-btn" id="careerDnaBtn" title="Career DNA">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10" opacity="0.3"/>
          <circle cx="12" cy="12" r="6" opacity="0.5"/>
          <circle cx="12" cy="12" r="2"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- CAREER DNA BAR (clickable) -->
  <div class="career-dna" id="careerDna">
    <div class="dna-label dna-label-left" id="dnaMovieLabel"></div>
    <div class="dna-bar-wrap">
      <div class="dna-bar" id="dnaBar"></div>
    </div>
    <div class="dna-label dna-label-right" id="dnaTvLabel"></div>
  </div>

  <!-- LOADING STATE -->
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <p>Building timeline...</p>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState" hidden>
    <div class="empty-icon"><svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M20 21v-2c0-2.2-1.8-4-4-4H8c-2.2 0-4 1.8-4 4v2"/></svg></div>
    <p id="emptyMessage">No filmography data available</p>
    <a href="../index.html" class="empty-link">Back to ORBIT</a>
  </div>

  <!-- UNIFIED TIMELINE VIEWPORT -->
  <div class="timeline-viewport" id="timelineViewport" hidden>
  <div class="timeline-scroll-area" id="timelineScrollArea">

    <!-- Unified Track -->
    <section class="unified-track" id="unifiedSection">
      <div class="track-content" id="unifiedContent">
        <svg class="sacred-svg" id="sacredSvg"></svg>
      </div>
    </section>

    <!-- Year Axis -->
    <div class="year-axis" id="yearAxis"></div>

  </div>
  </div>

  <!-- TOOLTIP -->
  <div class="entry-tooltip" id="entryTooltip" hidden></div>

  <!-- EPISODE TILES CONTAINER (positioned absolutely, moved by JS) -->
  <div class="episode-tiles-container" id="episodeTiles" hidden>
    <div class="episode-tiles-header" id="episodeTilesHeader"></div>
    <div class="episode-tiles-scroll" id="episodeTilesScroll"></div>
  </div>

  <!-- CAREER DNA POPUP -->
  <div class="career-dna-overlay" id="careerDnaOverlay" hidden>
    <div class="career-dna-popup">
      <button class="career-dna-close" id="careerDnaClose">&times;</button>
      <h3 class="dna-popup-title">CAREER DNA</h3>
      <div class="dna-popup-bar">
        <div class="dna-popup-film" id="dnaPopupFilm"></div>
        <div class="dna-popup-tv" id="dnaPopupTv"></div>
      </div>
      <div class="dna-popup-legend" id="dnaPopupLegend"></div>
      <div class="dna-popup-stats" id="dnaPopupStats"></div>
    </div>
  </div>

  <!-- Load Nebula Service Module -->
  <script type="module">
    import * as nebulaService from '../components/nebula-service.js';
    // Expose functions globally for Movie Cube IIFE
    window.getMergedNebulaData = nebulaService.getMergedNebulaData;
    window.getTopWords = nebulaService.getTopWords;
    window.saveUserReview = nebulaService.saveUserReview;
    window.getUserReviews = nebulaService.getUserReviews;
    window.calculateWordFrequencies = nebulaService.calculateWordFrequencies;
    window.clearUserReviews = nebulaService.clearUserReviews;
  </script>

  <script src="../config.js"></script>
  <script src="../orbit-utils.js"></script>
  <script src="../utils.js"></script>
  <script src="../components/shortlist-service.js"></script>
  <script src="../components/taste-service.js"></script>
  <script src="../components/encounter-service.js"></script>
  <script src="../components/trivia-stats.js"></script>
  <script src="../components/moviecube.js"></script>
  <script src="../components/people-cube.js"></script>
  <script src="actor-timeline.js?v=4"></script>
  <script src="../components/taste-interactions.js"></script>
  <script src="../components/shortlist-badge.js"></script>
</body>
</html>
